name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK
        run: |
          mkdir -p app-output
          cd app-output

          # Generate temp keystore for signing
          keytool -genkey -v -keystore release.keystore -alias desktop-pet -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Pet, OU=Dev, O=Pet, L=Unknown, ST=Unknown, C=CN"

          # Use expect-like approach to handle interactive prompts
          # Provide JDK path and Android SDK path, then empty lines for remaining
          timeout 120 bubblewrap init \
            --manifest https://xiaoyang0609.github.io/desktop-pet/manifest.json \
            --directory . \
            --jks-path release.keystore \
            --jks-key-alias desktop-pet \
            --jks-password android

      - name: Build APK (step 2)
        run: |
          cd app-output
          timeout 300 bubblewrap build --skipPwaValidation --skipVersionUpdate 2>&1 || timeout 300 bubblewrap build 2>&1

      - name: Show APK
        run: |
          echo "=== Find APK ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== app-output contents ==="
          ls -la app-output/ 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: desktop-pet-apk
          path: "**/*.apk"
          if-no-files-found: warn
