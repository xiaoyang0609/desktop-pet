name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
      - name: Build
        run: |
          set -e
          pip3 install Pillow -q 2>/dev/null || true
          python3 build-android.py
          cd android-project
          gradle wrapper --gradle-version=8.5 2>&1 || true
          [ -f gradlew ] && chmod +x gradlew || { curl -sLO https://services.gradle.org/distributions/gradle-8.5-bin.zip && unzip -q gradle-8.5-bin.zip -d /tmp/g && /tmp/g/gradle-8.5/bin/gradle wrapper --gradle-version=8.5; chmod +x gradlew; }
          ./gradlew assembleRelease --no-daemon 2>&1
      - name: Sign
        run: |
          APK=$(find . -path "*/outputs/apk/release/app-release-unsigned.apk" -type f | head -1)
          [ -z "$APK" ] && APK=$(find . -path "*/outputs/apk/release/*.apk" -type f | head -1)
          echo "APK: $APK"
          [ -z "$APK" ] && exit 1
          BT=$(ls -d ${ANDROID_HOME}/build-tools/*/ | sort -r | head -1)
          keytool -genkey -v -keystore ks.jks -alias k -keyalg RSA -keysize 2048 -storepass p -keypass p -dname "CN=P" -validity 10000 2>/dev/null
          ${BT}zipalign -p 4 "$APK" "${APK%.apk}-a.apk" 2>&1
          mv "${APK%.apk}-a.apk" "$APK"
          ${BT}apksigner sign --ks ks.jks --ks-key-alias k --ks-pass pass:p --key-pass pass:p "$APK" 2>&1
          ${BT}apksigner verify --verbose "$APK" 2>&1
          echo "DONE: $(stat -c%s "$APK") bytes"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: desktop-pet-apk
          path: "**/apk/release/*.apk"
          if-no-files-found: error
