name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Create Android app
        run: |
          mkdir -p app-output
          cd app-output
          echo n | bubblewrap init --manifest https://xiaoyang0609.github.io/desktop-pet/manifest.json --jks-path '' --jks-key-alias '' --web-manifest-url '' || true

      - name: Build APK
        run: |
          cd app-output
          timeout 600 bubblewrap build 2>&1 || echo "Build done"

      - name: Find and upload APK
        run: |
          find . -name "*.apk" -exec echo "Found: {}" \;
          find . -name "*.apk" -exec cp {} /tmp/apk-to-upload.apk \; || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: desktop-pet-apk
          path: "**/*.apk"
          if-no-files-found: warn