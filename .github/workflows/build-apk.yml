name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias desktop-pet -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=DesktopPet, OU=Dev, O=Pet, L=Unknown, ST=Unknown, C=CN"

      - name: Init Android project
        run: |
          mkdir -p app-output
          cd app-output
          # script creates TTY -> bubblewrap inquirer prompts work
          # provide: No to JDK install, then JDK path, then Android SDK path
          timeout 120 bash -c '
            echo -e "n\n${JAVA_HOME}\n${ANDROID_HOME}" | \
            script -q -fc "bubblewrap init \
              --manifest https://xiaoyang0609.github.io/desktop-pet/manifest.json \
              --directory . \
              --jks-path ../release.keystore \
              --jks-key-alias desktop-pet \
              --jks-password android" /dev/null
          ' || true

      - name: Build APK
        run: |
          cd app-output
          ls -la
          # Build with 25-minute timeout for Gradle first-time setup
          timeout 1500 script -q -fc "bubblewrap build" /dev/null

      - name: Find APK
        run: |
          echo "=== Search APK ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "no APK"
          find /home/runner -name "*.apk" -type f 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: desktop-pet-apk
          path: "**/*.apk"
          if-no-files-found: warn
