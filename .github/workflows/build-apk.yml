name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Build
        run: |
          set -e

          # --- ICONS ---
          pip3 install Pillow -q 2>/dev/null || true
          python3 << 'PYEOF'
import os, struct, zlib, math
def png(w,h,p):
    def c(t,d):
        return struct.pack('>I',len(d))+t+d+struct.pack('>I',zlib.crc32(t+d)&0xffffffff)
    r=bytearray()
    for y in range(h):
        r.append(0)
        for x in range(w): r.extend(p[y][x])
    ihdr=struct.pack('>IIBBBBB',w,h,8,6,0,0,0)
    return b'\x89PNG\r\n\x1a\n'+c(b'IHDR',ihdr)+c(b'IDAT',zlib.compress(bytes(r)))+c(b'IEND',b'')
S={'mdpi':48,'hdpi':72,'xhdpi':96,'xxhdpi':144,'xxxhdpi':192}
for d,px in S.items():
    cx,cy,r=px//2,px//2-px//8,px//3-1
    img=[[(26,26,46,0) for _ in range(px)] for _ in range(px)]
    for x in range(px):
        for y in range(px):
            if (x-cx)*(x-cx)+(y-cy)*(y-cy)<=r*r:
                img[y][x]=(74,144,217,255)
    er=px//12
    for x,y in [(cx-r//2,cy-er*2),(cx+r//2,cy-er*2)]:
        for dx in range(-er,er+1):
            for dy in range(-er,er+1):
                if dx*dx+dy*dy<=er*er and 0<=x+dx<px and 0<=y+dy<px:
                    img[y+dy][x+dx]=(255,255,255,255)
    mx,my,sz=cx,cy+er,px//20
    for dy in range(0,sz*2):
        for dx in range(-sz+1,sz):
            if dx*dx+(dy-sz)*(dy-sz)<=sz*sz and 0<=mx+dx<px and 0<=my+dy<px:
                img[my+dy][mx+dx]=(255,182,193,255)
    p=png(px,px,img)
    pth='android-project/app/src/main/res/mipmap-'+d
    os.makedirs(pth,exist_ok=True)
    open(pth+'/ic_launcher.png','wb').write(p)
PYEOF

          # --- PROJECT FILES ---
          mkdir -p android-project/app/src/main/java/com/desktop/pet
          mkdir -p android-project/app/src/main/res/values
          mkdir -p android-project/gradle/wrapper
          mkdir -p android-project/app/src/main/res/mipmap-anydpi-v26

          cd android-project

          # build.gradle
          cat > build.gradle << 'EOF'
          plugins {
              id "com.android.application" version "8.2.0" apply false
          }
          EOF

          # settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "DesktopPet"
          include ":app"
          EOF

          # gradle.properties
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # gradle wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # app/build.gradle
          cat > app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
          }
          android {
              namespace "com.desktop.pet"
              compileSdk 34
              defaultConfig {
                  applicationId "com.desktop.pet"
                  minSdk 21
                  targetSdk 34
                  versionCode 2
                  versionName "1.1"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation "androidx.appcompat:appcompat:1.6.1"
          }
          EOF

          touch app/proguard-rules.pro

          # adaptive icon
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@mipmap/ic_launcher"/>
              <foreground android:drawable="@mipmap/ic_launcher"/>
          </adaptive-icon>
          EOF

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="桌面宠物"
                  android:theme="@style/AppTheme"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="false">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # styles
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:statusBarColor">#1a1a2e</item>
                  <item name="android:navigationBarColor">#1a1a2e</item>
              </style>
          </resources>
          EOF

          # MainActivity
          cat > app/src/main/java/com/desktop/pet/MainActivity.java << 'EOF'
          package com.desktop.pet;
          import android.os.Bundle;
          import android.webkit.*;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              private WebView wv;
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  wv = new WebView(this);
                  WebSettings s = wv.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setLoadWithOverviewMode(true);
                  s.setUseWideViewPort(true);
                  wv.setWebViewClient(new WebViewClient());
                  setContentView(wv);
                  wv.loadUrl("https://xiaoyang0609.github.io/desktop-pet/");
              }
              @Override
              public void onBackPressed() {
                  if (wv.canGoBack()) wv.goBack();
                  else super.onBackPressed();
              }
          }
          EOF

          echo "Project ready"

      - name: Build APK
        run: |
          cd android-project
          gradle wrapper --gradle-version=8.5 2>&1 || true
          [ -f gradlew ] || { curl -sLO https://services.gradle.org/distributions/gradle-8.5-bin.zip && unzip -q gradle-8.5-bin.zip -d /tmp/g && /tmp/g/gradle-8.5/bin/gradle wrapper --gradle-version=8.5; }
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleRelease --no-daemon 2>&1

      - name: Sign APK
        run: |
          APK=$(find . -path "*/outputs/apk/release/app-release-unsigned.apk" -type f | head -1)
          [ -z "$APK" ] && APK=$(find . -name "*.apk" -type f | head -1)
          [ -z "$APK" ] && { echo "No APK"; find . -name "*.apk"; exit 1; }
          BT=$(ls -d ${ANDROID_HOME}/build-tools/*/ | sort -r | head -1)
          keytool -genkey -v -keystore k.jks -alias k -keyalg RSA -keysize 2048 -storepass android -keypass android -dname "CN=Pet" -validity 10000 2>/dev/null
          ${BT}zipalign -p 4 "$APK" "${APK%.apk}-a.apk" 2>&1
          mv -f "${APK%.apk}-a.apk" "$APK"
          ${BT}apksigner sign --ks k.jks --ks-key-alias k --ks-pass pass:android --key-pass pass:android "$APK" 2>&1
          ${BT}apksigner verify --verbose "$APK" 2>&1
          echo "DONE=$(stat -c%s "$APK") bytes"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: desktop-pet-apk
          path: "**/outputs/apk/release/*.apk"
          if-no-files-found: error
