name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install @bubblewrap/cli
        run: npm install -g @bubblewrap/cli

      - name: Generate Android project via Node script
        run: |
          mkdir -p app-output

          # Create a Node.js script that generates the project programmatically
          cat > generate.mjs << 'SCRIPT'
          import { TwaGenerator, TwaManifest, Log } from '@bubblewrap/core';
          import * as path from 'path';
          import * as fs from 'fs';
          import { fileURLToPath } from 'url';

          const __dirname = path.dirname(fileURLToPath(import.meta.url));
          const outputDir = path.join(__dirname, 'app-output');

          const manifest = new TwaManifest({
            packageId: 'com.desktop.pet',
            host: 'xiaoyang0609.github.io',
            name: '桌面宠物',
            launcherName: '桌面宠物',
            startUrl: '/desktop-pet/',
            display: 'standalone',
            orientation: 'any',
            themeColor: '#4A90D9',
            backgroundColor: '#1a1a2e',
            appVersionName: '1.0',
            appVersionCode: 1,
            iconUrl: 'https://xiaoyang0609.github.io/desktop-pet/pet_cat.png',
            maskableIconUrl: 'https://xiaoyang0609.github.io/desktop-pet/pet_cat.png',
            monochromeIconUrl: 'https://xiaoyang0609.github.io/desktop-pet/pet_cat.png',
            signingKey: {
              path: path.join(__dirname, 'release.keystore'),
              keyAlias: 'desktop-pet',
              keyPassword: 'android',
              storePassword: 'android',
            },
            shortcuts: [],
            fallbackUrl: '',
            appVersion: '1.0.0',
            splashScreenFadeOutDuration: 300,
            enableSiteSettingsShortcut: true,
            isAgentAllowed: false,
            isDomainInclusionRequired: false,
            apkUrl: '',
            includeSourceInfo: false,
            appVersionIsAWebsite: false,
          });

          const generator = new TwaGenerator();
          const log = new Log('cli');
          await generator.createTwaProject(outputDir, manifest, log);
          console.log('✅ TWA project generated in', outputDir);
          SCRIPT

          # Generate keystore
          keytool -genkey -v -keystore release.keystore -alias desktop-pet -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Pet, OU=Dev, O=Pet, L=Unknown, ST=Unknown, C=CN"

          # Run the script
          cd app-output
          node ../generate.mjs 2>&1

      - name: Build APK
        run: |
          cd app-output
          echo "=== Files ==="
          ls -la
          echo ""
          echo "=== Project files ==="
          find . -name "*.gradle" -o -name "*.xml" -o -name "*.java" 2>/dev/null | head -20
          echo ""
          echo "=== Build ==="
          chmod +x gradlew
          ./gradlew assembleRelease 2>&1 || true

      - name: Find and upload APK
        run: |
          echo "=== Find APK ==="
          find /home/runner/work -name "*.apk" -type f 2>/dev/null
          find . -name "*.apk" -type f 2>/dev/null
          find /home/runner -name "*.apk" -type f -exec ls -la {} \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: desktop-pet-apk
          path: "**/*.apk"
          if-no-files-found: warn
