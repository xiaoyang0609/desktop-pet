name: Build Android APK

on:
  workflow_dispatch:   # 手动触发
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Create Android app from PWA
        run: |
          mkdir -p app-output
          cd app-output
          # non-interactive: answer "n" (use existing JDK) then provide JAVA_HOME path
          printf 'n\n%s\n' "$JAVA_HOME" | bubblewrap init \
            --manifest https://xiaoyang0609.github.io/desktop-pet/manifest.json \
            --signing-key-path ""

      - name: Build APK
        run: |
          cd app-output
          bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: desktop-pet-apk
          path: app-output/app/build/outputs/apk/*.apk
