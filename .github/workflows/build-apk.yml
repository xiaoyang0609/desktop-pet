name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
      - name: Generate Android project
        run: |
          npm install @bubblewrap/core 2>&1 | tail -3
          keytool -genkey -v -keystore release.keystore -alias desktop-pet -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Pet, OU=Dev, O=Pet, L=Unknown, ST=Unknown, C=CN"
          mkdir -p app-output
          cat > gen.cjs << 'SCRIPT'
          const { TwaGenerator, TwaManifest, ConsoleLog } = require('@bubblewrap/core');
          const path = require('path');
          const cwd = process.cwd();
          const icon = 'https://xiaoyang0609.github.io/desktop-pet/icon.svg';
          const manifest = new TwaManifest({
            packageId: 'com.desktop.pet', host: 'xiaoyang0609.github.io',
            name: '桌面宠物', launcherName: '桌面宠物',
            startUrl: '/desktop-pet/', display: 'standalone',
            orientation: 'any', themeColor: '#4A90D9', backgroundColor: '#1a1a2e',
            appVersionName: '1.0', appVersionCode: 1,
            iconUrl: icon, maskableIconUrl: icon, monochromeIconUrl: icon,
            signingKey: {
              path: path.join(cwd, 'release.keystore'),
              keyAlias: 'desktop-pet', keyPassword: 'android', storePassword: 'android',
            },
            shortcuts: [], fallbackUrl: '', appVersion: '1.0.0',
            splashScreenFadeOutDuration: 300,
            enableSiteSettingsShortcut: true, enableNotifications: false,
            alphaDependencies: { enabled: false },
            isChromeOSOnly: false, isMetaQuest: false,
            isAgentAllowed: false, isDomainInclusionRequired: false,
            apkUrl: '', includeSourceInfo: false, appVersionIsAWebsite: false,
            minSdkVersion: 21,
            features: {}, fingerprints: [],
            additionalTrustedOrigins: [], retainedBundles: [],
          });
          const generator = new TwaGenerator();
          const log = new ConsoleLog('generate');
          generator.createTwaProject(path.join(cwd, 'app-output'), manifest, log)
            .then(() => console.log('✅ Project generated!'))
            .catch(e => { console.error('❌', e.message); process.exit(1); });
          SCRIPT
          node gen.cjs 2>&1
      - name: Build and sign APK
        run: |
          cd app-output
          chmod +x gradlew
          ./gradlew assembleRelease 2>&1
          
          echo "=== Signing & Aligning APK ==="
          UNSIGNED=$(find . -name "*-unsigned.apk" -type f 2>/dev/null | head -1)
          if [ -z "$UNSIGNED" ]; then
            echo "ERROR: No unsigned APK found"
            find . -name "*.apk" -type f
            exit 1
          fi
          
          # zipalign first
          BUILD_TOOLS="${ANDROID_HOME}/build-tools"
          ZIPALIGN_DIR=$(ls -d "$BUILD_TOOLS"/*/ 2>/dev/null | sort -r | head -1)
          ZIPALIGN="${ZIPALIGN_DIR}zipalign"
          
          ALIGNED="${UNSIGNED/-unsigned/-aligned}"
          SIGNED="${UNSIGNED/-unsigned/}"
          
          $ZIPALIGN -v -p 4 "$UNSIGNED" "$ALIGNED" 2>&1
          echo "✅ Zipaligned: $ALIGNED"
          
          # Sign with apksigner (supports v1+v2+v3)
          APKSIGNER="${ZIPALIGN_DIR}apksigner"
          $APKSIGNER sign --ks ../release.keystore --ks-key-alias desktop-pet --ks-pass pass:android --key-pass pass:android --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --out "$SIGNED" "$ALIGNED" 2>&1
          
          # Verify
          $APKSIGNER verify --verbose "$SIGNED" 2>&1
          
          echo "✅ Signed APK: $SIGNED ($(stat -c%s "$SIGNED") bytes)"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: desktop-pet-apk
          path: "**/app-release.apk"
          if-no-files-found: error
