name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialize Android app
        run: |
          mkdir -p app-output
          cd app-output
          printf 'n\n%s\n' "$JAVA_HOME" | bubblewrap init --manifest https://xiaoyang0609.github.io/desktop-pet/manifest.json --jks-path '' --jks-key-alias '' --web-manifest-url ''

      - name: Build APK
        run: |
          cd app-output
          bubblewrap build 2>&1

      - name: Show output
        run: |
          echo "=== Find APK ==="
          find . -name "*.apk" 2>/dev/null
          echo "=== app-output ==="
          ls -la app-output/ 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: desktop-pet-apk
          path: "**/*.apk"
          if-no-files-found: warn