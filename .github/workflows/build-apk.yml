name: Build Android WebView APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Create Android project
        run: |
          # Generate keystore
          keytool -genkey -v -keystore release.keystore -alias desktop-pet -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname "CN=Pet, OU=Dev, O=Pet, L=Unknown, ST=Unknown, C=CN"

          mkdir -p android-project/app/src/main/java/com/desktop/pet
          mkdir -p android-project/app/src/main/res/drawable
          mkdir -p android-project/app/src/main/res/values
          mkdir -p android-project/app/src/main/res/mipmap-hdpi
          mkdir -p android-project/app/src/main/res/mipmap-mdpi
          mkdir -p android-project/app/src/main/res/mipmap-xhdpi
          mkdir -p android-project/app/src/main/res/mipmap-xxhdpi
          mkdir -p android-project/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android-project/gradle/wrapper

          cd android-project

          # ========== settings.gradle ==========
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolution {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "DesktopPet"
          include ':app'
          EOF

          # ========== build.gradle (root) ==========
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          # ========== gradle.properties ==========
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # ========== gradle-wrapper.properties ==========
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # ========== app/build.gradle ==========
          cat > app/build.gradle << 'JAVA'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.desktop.pet'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.desktop.pet'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.9.0'
              implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
          }
          JAVA

          # ========== AndroidManifest.xml ==========
          cat > app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.desktop.pet">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="桌面宠物"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="false">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|screenLayout|keyboardHidden"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XML

          # ========== MainActivity.java ==========
          cat > app/src/main/java/com/desktop/pet/MainActivity.java << 'JAVA'
          package com.desktop.pet;

          import android.annotation.SuppressLint;
          import android.graphics.Bitmap;
          import android.os.Bundle;
          import android.view.View;
          import android.webkit.WebChromeClient;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.ProgressBar;
          import android.widget.FrameLayout;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              private ProgressBar progressBar;

              @SuppressLint("SetJavaScriptEnabled")
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  // Create root layout
                  FrameLayout layout = new FrameLayout(this);

                  // Create WebView
                  webView = new WebView(this);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);
                  settings.setLoadWithOverviewMode(true);
                  settings.setUseWideViewPort(true);
                  settings.setBuiltInZoomControls(false);
                  settings.setDisplayZoomControls(false);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  settings.setAllowFileAccess(false);
                  settings.setAllowContentAccess(false);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_NEVER_ALLOW);

                  // Enable hardware acceleration
                  webView.setLayerType(View.LAYER_TYPE_HARDWARE, null);

                  // Cookie manager
                  android.webkit.CookieManager.getInstance().setAcceptCookie(true);

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                          String url = request.getUrl().toString();
                          if (url.startsWith("https://xiaoyang0609.github.io/desktop-pet")) {
                              return false;
                          }
                          // Open external links in browser
                          android.content.Intent intent = new android.content.Intent(
                              android.content.Intent.ACTION_VIEW, android.net.Uri.parse(url));
                          startActivity(intent);
                          return true;
                      }

                      @Override
                      public void onPageStarted(WebView view, String url, Bitmap favicon) {
                          super.onPageStarted(view, url, favicon);
                          progressBar.setVisibility(View.VISIBLE);
                      }

                      @Override
                      public void onPageFinished(WebView view, String url) {
                          super.onPageFinished(view, url);
                          progressBar.setVisibility(View.GONE);
                      }
                  });

                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onProgressChanged(WebView view, int newProgress) {
                          progressBar.setProgress(newProgress);
                      }
                  });

                  // Add WebView to layout
                  layout.addView(webView, new FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.MATCH_PARENT,
                      FrameLayout.LayoutParams.MATCH_PARENT));

                  // Create progress bar
                  progressBar = new ProgressBar(this, null, android.R.attr.progressBarStyleHorizontal);
                  progressBar.setMax(100);
                  progressBar.setVisibility(View.GONE);
                  layout.addView(progressBar, new FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.MATCH_PARENT,
                      dpToPx(3)));

                  setContentView(layout);

                  // Load the PWA
                  webView.loadUrl("https://xiaoyang0609.github.io/desktop-pet/");
              }

              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }

              private int dpToPx(int dp) {
                  float density = getResources().getDisplayMetrics().density;
                  return (int) (dp * density + 0.5f);
              }
          }
          JAVA

          # ========== styles.xml ==========
          cat > app/src/main/res/values/styles.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:statusBarColor">#1a1a2e</item>
                  <item name="android:navigationBarColor">#1a1a2e</item>
              </style>
          </resources>
          XML

          # ========== colors.xml ==========
          cat > app/src/main/res/values/colors.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="primary">#4A90D9</color>
              <color name="primary_dark">#357ABD</color>
              <color name="background">#1a1a2e</color>
              <color name="white">#FFFFFF</color>
          </resources>
          XML

          # ========== strings.xml ==========
          cat > app/src/main/res/values/strings.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">桌面宠物</string>
          </resources>
          XML

          # ========== Generate launcher icon (SVG as XML vector drawable) ==========
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <group android:translateX="24" android:translateY="24">
                  <!-- Cat face -->
                  <path android:fillColor="#4A90D9"
                      android:pathData="M30,15 C30,10 35,5 40,10 L45,20 L50,10 C55,5 60,10 60,15 L65,30
                          L65,45 C65,55 55,60 45,60 C35,60 25,55 25,45 L25,30 Z" />
                  <!-- Eyes -->
                  <path android:fillColor="#FFFFFF"
                      android:pathData="M32,25 A4,4 0,1,1,32,33 A4,4 0,1,1,32,25Z" />
                  <path android:fillColor="#FFFFFF"
                      android:pathData="M48,25 A4,4 0,1,1,48,33 A4,4 0,1,1,48,25Z" />
                  <!-- Nose -->
                  <path android:fillColor="#FFB6C1"
                      android:pathData="M40,35 L42,38 L38,38 Z" />
                  <!-- Mouth -->
                  <path android:fillColor="none"
                      android:strokeColor="#333"
                      android:strokeWidth="1"
                      android:pathData="M38,38 Q40,42 42,38" />
              </group>
          </vector>
          XML

          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path android:fillColor="#1a1a2e"
                  android:pathData="M0,0h108v108h-108z" />
          </vector>
          XML

          # ========== Adaptive icon ==========
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          XML

          # ========== Generate fallback PNG launcher icon (a blue square) ==========
          # Use a tiny base64 PNG for fallback - a simple blue cat face
          python3 -c "
          import base64
          # Minimal 48x48 blue PNG pixel
          png_base64 = ''
          for size in ['mdpi', 'hdpi', 'xhdpi', 'xxhdpi', 'xxxhdpi']:
              path = f'app/src/main/res/mipmap-{size}/ic_launcher.png'
              with open(path, 'wb') as f:
                  f.write(base64.b64decode(png_base64))
              print(f'Created {path}')
          "

          # ========== proguard-rules.pro (empty) ==========
          touch app/proguard-rules.pro

          # ========== Download Gradle Wrapper ==========
          cd ..
          GRADLE_VERSION=8.5
          WRAPPER_JAR_URL="https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar"
          # Use a minimal gradle-wrapper.jar
          curl -sL "https://raw.githubusercontent.com/openclaw/gradle-wrapper/main/gradle/wrapper/gradle-wrapper.jar" \
            -o "android-project/gradle/wrapper/gradle-wrapper.jar" 2>/dev/null || true

          # If download fails, create wrapper script
          if [ ! -f "android-project/gradle/wrapper/gradle-wrapper.jar" ] || [ ! -s "android-project/gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Creating gradlew script using installed gradle..."
            cat > android-project/gradlew << 'GRADLEW'
          #!/bin/sh
          GRADLE_HOME=$(dirname $(dirname $(which java)))
          # Check if gradle is installed
          if command -v gradle > /dev/null 2>&1; then
            exec gradle "$@"
          else
            echo "Gradle not found, installing..."
            cd $(dirname $0)
            curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle
            /tmp/gradle/gradle-8.5/bin/gradle "$@"
          fi
          GRADLEW
            chmod +x android-project/gradlew
          fi

      - name: Build APK
        run: |
          cd android-project
          
          # Use gradle directly (it's installed by setup-java)
          gradle wrapper --gradle-version=8.5 2>&1 || true
          ./gradlew assembleRelease --no-daemon 2>&1

      - name: Sign APK
        run: |
          echo "=== Finding unsigned APK ==="
          UNSIGNED=$(find . -path "*/outputs/apk/release/*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$UNSIGNED" ]; then
            echo "Searching all APKs..."
            find . -name "*.apk" -type f
            exit 1
          fi
          echo "Unsigned: $UNSIGNED ($(stat -c%s "$UNSIGNED") bytes)"

          BUILD_TOOLS="${ANDROID_HOME}/build-tools"
          ZIPALIGN_DIR=$(ls -d "$BUILD_TOOLS"/*/ 2>/dev/null | sort -r | head -1)
          ZIPALIGN="${ZIPALIGN_DIR}zipalign"
          APKSIGNER="${ZIPALIGN_DIR}apksigner"

          ALIGNED="${UNSIGNED%.apk}-aligned.apk"
          SIGNED="${UNSIGNED%.apk}.apk"

          $ZIPALIGN -v -p 4 "$UNSIGNED" "$ALIGNED" 2>&1
          echo "✅ Zipaligned"

          rm -f "$SIGNED"
          $APKSIGNER sign --ks release.keystore --ks-key-alias desktop-pet \
            --ks-pass pass:android --key-pass pass:android \
            --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true \
            --out "$SIGNED" "$ALIGNED" 2>&1

          $APKSIGNER verify --verbose "$SIGNED" 2>&1

          echo "✅ Signed APK: $SIGNED ($(stat -c%s "$SIGNED") bytes)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: desktop-pet-apk
          path: "**/outputs/apk/release/**/*.apk"
          if-no-files-found: error
